<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Status — Analytics</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100vh;}
  .safe-area{padding:env(safe-area-inset-top,54px) 16px 0 16px;}

  /* ---- Header ---- */
  .header{display:flex;justify-content:space-between;align-items:flex-start;padding-top:12px;}
  .header-left h1{font-size:34px;font-weight:700;letter-spacing:0.01em;line-height:1.1;}
  .header-left .date{font-size:17px;color:#8E8E93;font-weight:400;margin-top:4px;}
  .header-right{display:flex;gap:10px;padding-top:6px;}
  .icon-btn{width:36px;height:36px;border-radius:50%;background:#1C1C1E;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .icon-btn svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}

  /* ---- Section Header ---- */
  .section-header{display:flex;align-items:center;gap:6px;margin-top:24px;margin-bottom:8px;}
  .section-header h2{font-size:17px;font-weight:600;color:#fff;}
  .section-header svg{width:16px;height:16px;fill:none;stroke:#8E8E93;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}

  /* ---- List ---- */
  .row{display:flex;align-items:center;height:64px;padding:0;}
  .row+.row{border-top:1px solid #1C1C1E;}
  .row-left{flex:1;min-width:0;}
  .row-name{font-size:17px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .row-sub{font-size:13px;color:#8E8E93;font-weight:400;margin-top:1px;}
  .row-spark{width:80px;height:28px;flex-shrink:0;margin:0 16px;}
  .row-spark svg{width:80px;height:28px;}
  .row-right{text-align:right;flex-shrink:0;}
  .row-value{font-size:17px;font-weight:600;color:#fff;white-space:nowrap;}
  .row-change{display:inline-block;font-size:13px;font-weight:600;border-radius:6px;padding:2px 8px;margin-top:2px;white-space:nowrap;}
  .row-change.up{background:#1A3A1F;color:#30D158;}
  .row-change.down{background:#3A1A1A;color:#FF3B30;}

  /* ---- Bottom Sheet ---- */
  .bottom-sheet{position:fixed;bottom:0;left:0;right:0;background:#1C1C1E;border-radius:16px 16px 0 0;padding:16px 20px;padding-bottom:calc(16px + env(safe-area-inset-bottom,20px));display:flex;align-items:center;justify-content:space-between;z-index:100;}
  .bs-left h3{font-size:17px;font-weight:700;color:#fff;}
  .bs-left p{font-size:13px;color:#8E8E93;font-weight:400;margin-top:1px;}
  .bs-badge{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#007aff,#5856d6);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;}

  /* bottom sheet spacer */
  .sheet-spacer{height:90px;}
</style>
</head>
<body>
<div class="safe-area">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1>Analytics</h1>
      <div class="date" id="currentDate"></div>
    </div>
    <div class="header-right">
      <button class="icon-btn"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg></button>
      <button class="icon-btn"><svg viewBox="0 0 24 24"><circle cx="6" cy="12" r="1.5" fill="#fff" stroke="none"/><circle cx="12" cy="12" r="1.5" fill="#fff" stroke="none"/><circle cx="18" cy="12" r="1.5" fill="#fff" stroke="none"/></svg></button>
    </div>
  </div>

  <!-- Section -->
  <div class="section-header">
    <h2>My Venues</h2>
    <svg viewBox="0 0 24 24"><path d="M7 15l5 5 5-5"/><path d="M7 9l5-5 5 5"/></svg>
  </div>

  <!-- Rows -->
  <div id="rows"></div>

  <div class="sheet-spacer"></div>
</div>

<!-- Bottom Sheet -->
<div class="bottom-sheet">
  <div class="bs-left">
    <h3>Insights</h3>
    <p>From Status</p>
  </div>
  <div class="bs-badge">S</div>
</div>

<script>
// Date
const d=new Date();
document.getElementById('currentDate').textContent=d.toLocaleDateString('en-US',{month:'long',day:'numeric'});

// Sparkline generator
function spark(points,down){
  const w=80,h=28,pad=2;
  const xs=points.map((_,i)=>pad+(i/(points.length-1))*(w-pad*2));
  const mn=Math.min(...points),mx=Math.max(...points),rng=mx-mn||1;
  const ys=points.map(v=>h-pad-(v-mn)/rng*(h-pad*2));
  const pts=xs.map((x,i)=>x+','+ys[i]).join(' ');
  const color=down?'#FF3B30':'#30D158';
  const dash=down?' stroke-dasharray="4 3"':'';
  return `<svg viewBox="0 0 ${w} ${h}"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"${dash}/></svg>`;
}

const data=[
  {name:'Total Revenue',sub:'All Venues',value:'$48,291',change:'+$3,812',up:true,pts:[22,25,23,28,30,27,33,36,35,40]},
  {name:'Cover Charge',sub:'Door Revenue',value:'$12,450',change:'+18.2%',up:true,pts:[10,12,11,14,13,16,18,17,20,22]},
  {name:'Bar Revenue',sub:'Drinks & Bottles',value:'$28,640',change:'+$2,104',up:true,pts:[30,28,32,35,33,36,34,38,40,42]},
  {name:'Mansion',sub:'Top Venue',value:'$18,320',change:'+24.1%',up:true,pts:[8,10,9,12,14,13,16,18,17,21]},
  {name:'Saturday Social',sub:'Top Event',value:'$9,840',change:'+$1,220',up:true,pts:[5,7,6,8,7,9,11,10,12,14]},
  {name:'Tickets Sold',sub:'This Week',value:'1,847',change:'+312',up:true,pts:[100,110,105,120,115,130,125,140,145,155]},
  {name:'Avg Guest Spend',sub:'Per Person',value:'$41.20',change:'-$2.10',up:false,pts:[45,44,43,44,42,43,41,42,40,41]},
  {name:'Active Tabs',sub:'Open Now',value:'23',change:'+8',up:true,pts:[10,12,15,14,18,16,20,19,22,23]},
];

const container=document.getElementById('rows');
data.forEach(r=>{
  const el=document.createElement('div');
  el.className='row';
  el.innerHTML=`
    <div class="row-left">
      <div class="row-name">${r.name}</div>
      <div class="row-sub">${r.sub}</div>
    </div>
    <div class="row-spark">${spark(r.pts,!r.up)}</div>
    <div class="row-right">
      <div class="row-value">${r.value}</div>
      <div class="row-change ${r.up?'up':'down'}">${r.change}</div>
    </div>`;
  container.appendChild(el);
});
</script>
</body>
</html>
